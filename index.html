<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>PatchinPennies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
:root{
  --bg:#fdf6f9;--bg2:#fff0f7;--card:#ffffff;--card2:#fef3fb;
  --border:#f0d6e8;--border2:#e8c8dc;
  --txt:#4a3048;--txt2:#8a6880;--txt3:#b89aad;
  --pink:#f472b6;--pink-soft:#fce7f3;--pink-glow:rgba(244,114,182,0.2);
  --lavender:#a78bfa;--lav-soft:#ede9fe;--lav-glow:rgba(167,139,250,0.2);
  --mint:#34d399;--mint-soft:#d1fae5;
  --peach:#fb923c;--peach-soft:#ffedd5;
  --sky:#60a5fa;--sky-soft:#dbeafe;
  --rose:#fb7185;--rose-soft:#ffe4e6;
  --yellow:#fbbf24;--yellow-soft:#fef3c7;
  --radius:18px;--font:'Nunito',sans-serif;--mono:'DM Mono',monospace;
  --shadow:0 2px 16px rgba(200,140,180,.12);--shadow-lg:0 6px 32px rgba(200,140,180,.2);
}
body{background:var(--bg);color:var(--txt);font-family:var(--font);font-size:14px;line-height:1.5;min-height:100%;padding-bottom:86px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(circle,#f9c8e4 1px,transparent 1px);background-size:28px 28px;opacity:.3}

/* ── Header ── */
.hdr{position:sticky;top:0;z-index:90;background:rgba(253,246,249,.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:2px solid var(--border);padding:10px 16px 8px}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.wordmark{font-weight:900;font-size:19px;letter-spacing:-.5px;color:var(--txt);display:flex;align-items:center;gap:6px}
.wordmark em{font-style:normal;color:var(--pink)}
.hdr-chip{font-family:var(--mono);font-size:10px;background:var(--pink-soft);border:1.5px solid var(--border);border-radius:20px;padding:4px 10px;color:var(--txt2);display:flex;align-items:center;gap:5px}
.hdr-chip .dot{width:6px;height:6px;border-radius:50%;background:var(--mint);box-shadow:0 0 6px var(--mint)}
.month-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.month-btn{width:30px;height:30px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--txt2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:all .15s}
.month-btn:active{background:var(--pink-soft)}
.month-lbl{flex:1;text-align:center;font-family:var(--mono);font-size:11px;color:var(--txt2);letter-spacing:.5px}
.mini-spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--pink);border-radius:50%;animation:spin .6s linear infinite}

/* ── Nav ── */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:90;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:2px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0px)}
.nav-btn{flex:1;border:none;background:none;color:var(--txt3);cursor:pointer;display:flex;flex-direction:column;align-items:center;padding:8px 0 6px;gap:2px;font-family:var(--font);font-size:9px;font-weight:800;transition:color .15s}
.nav-btn.on{color:var(--pink)}
.nav-btn.on.amber{color:var(--yellow)}
.nav-icon{font-size:17px;line-height:1}
.nav-btn.add-btn .nav-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--pink),var(--lavender));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;box-shadow:0 4px 16px var(--pink-glow);transition:transform .15s}
.nav-btn.add-btn:active .nav-icon{transform:scale(.92)}

/* ── Views ── */
.view{display:none;padding:14px;position:relative;z-index:1}
.view.on{display:block}
.view.add-view{padding:14px 10px 32px}

/* ── Cards ── */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-title{font-size:10px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px}
.card-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title-row .card-title{margin-bottom:0}
.card-toggle{font-size:11px;font-weight:800;color:var(--pink);cursor:pointer;background:none;border:none;font-family:var(--font);padding:0}

/* ── Total card ── */
.total-card{background:linear-gradient(135deg,#fce7f3,#ede9fe);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:10px;position:relative;overflow:hidden;box-shadow:var(--shadow-lg)}
.total-card::after{content:'🐾';position:absolute;right:16px;bottom:8px;font-size:56px;opacity:.1;pointer-events:none}
.total-eyebrow{font-size:10px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px}
.total-amount{font-family:var(--mono);font-size:40px;font-weight:500;letter-spacing:-2px;line-height:1;color:var(--txt);margin-bottom:4px}
.total-sub{font-size:12px;color:var(--txt2);font-weight:700}

/* ── Stats ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:13px;box-shadow:var(--shadow)}
.stat-lbl{font-size:10px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.stat-lbl .pip{width:7px;height:7px;border-radius:50%}
.stat-val{font-family:var(--mono);font-size:20px;font-weight:500;letter-spacing:-.5px}
.stat-val.pink{color:var(--pink)}
.stat-val.lav{color:var(--lavender)}

/* ── Budget bars ── */
.bud-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.bud-name{font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px}
.bud-nums{font-family:var(--mono);font-size:10px;color:var(--txt3)}
.track{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:10px}
.track:last-child{margin-bottom:0}
.track-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.23,1,.32,1)}
.track-fill.safe{background:linear-gradient(90deg,var(--mint),#6ee7b7)}
.track-fill.warn{background:linear-gradient(90deg,var(--yellow),#fcd34d)}
.track-fill.danger{background:linear-gradient(90deg,var(--rose),#fda4af)}
.track-fill.none{background:var(--border2)}

/* ── Goals ── */
.goal-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.goal-card::before{content:'🌟';position:absolute;right:12px;top:10px;font-size:30px;opacity:.15;pointer-events:none}
.goal-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.goal-name{font-size:15px;font-weight:900;color:var(--txt)}
.goal-date{font-family:var(--mono);font-size:10px;color:var(--txt3);margin-top:2px;font-weight:500}
.goal-pct{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--yellow)}
.goal-nums{display:flex;justify-content:space-between;margin-bottom:7px}
.goal-saved{font-family:var(--mono);font-size:12px;color:var(--mint);font-weight:500}
.goal-target{font-family:var(--mono);font-size:12px;color:var(--txt3)}
.goal-note{font-size:11px;color:var(--txt3);margin-top:8px;font-style:italic;font-weight:600}
.goal-actions{display:flex;gap:6px;margin-top:10px}
.goal-btn{flex:1;padding:8px;border-radius:10px;font-size:11px;font-weight:800;cursor:pointer;font-family:var(--font);border:none;transition:all .15s}
.goal-btn:active{opacity:.8}
.goal-btn.add-prog{background:var(--yellow-soft);color:#92400e;border:1.5px solid #fde68a}
.goal-btn.del-goal{background:var(--rose-soft);color:#be123c;border:1.5px solid #fecdd3}
.goal-done{text-align:center;padding:8px}
.goal-done-badge{background:var(--mint-soft);border:1.5px solid #6ee7b7;border-radius:20px;display:inline-block;padding:4px 14px;font-size:11px;color:#065f46;font-weight:800}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(74,48,72,.45);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(6px)}
.modal{background:var(--card);border:1.5px solid var(--border);border-radius:24px 24px 0 0;padding:20px 18px 48px;width:100%;box-shadow:0 -8px 40px rgba(200,140,180,.2);animation:slideUp .22s cubic-bezier(.23,1,.32,1);max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:16px;font-weight:900;margin-bottom:14px;color:var(--txt)}
.modal-row{display:flex;gap:8px;margin-top:12px}
.modal-cancel{flex:1;padding:13px;border-radius:12px;background:var(--bg2);border:1.5px solid var(--border);color:var(--txt2);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.modal-confirm{flex:2;padding:13px;border-radius:12px;background:linear-gradient(135deg,var(--pink),var(--lavender));border:none;color:#fff;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--font)}
.modal-del{width:100%;margin-top:8px;padding:12px;border-radius:12px;background:var(--rose-soft);border:1.5px solid #fecdd3;color:#be123c;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--font)}

/* ── Seed bar ── */
.seed-bar{background:var(--mint-soft);border:1.5px solid #6ee7b7;border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px;box-shadow:var(--shadow)}
.seed-text{font-size:12px;font-weight:700;color:#065f46}
.seed-text small{color:#047857;font-size:11px;display:block;margin-top:1px;font-weight:600}
.seed-go{background:var(--mint);color:#fff;border:none;border-radius:10px;padding:7px 14px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap;font-family:var(--font);flex-shrink:0;transition:opacity .15s}
.seed-go:active{opacity:.8}

/* ── Cat grid ── */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cat-cell{background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:10px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.cat-cell .ico{font-size:20px;flex-shrink:0}
.cat-cell .meta{min-width:0}
.cat-cell .meta-name{font-size:10px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}
.cat-cell .meta-amt{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--txt);letter-spacing:-.3px}

/* ── Forms ── */
.fgroup{margin-bottom:16px}
.flabel{font-size:10px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:1.2px;display:block;margin-bottom:7px}
.finput{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:11px 13px;color:var(--txt);font-size:14px;font-family:var(--font);font-weight:600;outline:none;transition:border-color .15s;-webkit-appearance:none;box-shadow:var(--shadow)}
.finput:focus{border-color:var(--pink)}
.finput.big{font-family:var(--mono);font-size:34px;font-weight:500;text-align:center;padding:14px;letter-spacing:-1px}
.finput.big::placeholder{color:var(--txt3)}
select.finput{background:var(--card)}

.toggle-row{display:flex;gap:6px}
.tpill{flex:1;padding:10px 6px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;color:var(--txt3);font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;font-family:var(--font);box-shadow:var(--shadow)}
.tpill.on{border-color:var(--pink);background:var(--pink-soft);color:var(--pink)}
.tpill.on.v{border-color:var(--lavender);background:var(--lav-soft);color:var(--lavender)}
.tpill.on.g{border-color:var(--mint);background:var(--mint-soft);color:#059669}
.tpill.on.y{border-color:var(--yellow);background:var(--yellow-soft);color:#92400e}

/* Category pills — 4 across */
.cat-pick{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.cpill{padding:8px 2px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;color:var(--txt3);font-size:9px;font-weight:700;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s;font-family:var(--font);box-shadow:var(--shadow)}
.cpill .ci{font-size:18px}
.cpill.on{border-color:var(--pink);background:var(--pink-soft);color:var(--txt)}

.sub-btn{width:100%;background:linear-gradient(135deg,var(--pink),var(--lavender));color:#fff;border:none;border-radius:14px;padding:15px;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--font);letter-spacing:.2px;box-shadow:0 6px 24px var(--pink-glow);transition:all .15s}
.sub-btn:active{opacity:.88;transform:scale(.99)}
.sub-btn:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}

/* ── Transaction list ── */
.date-grp{margin-bottom:14px}
.date-lbl{font-size:10px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;padding-left:2px;display:flex;align-items:center;gap:6px}
.date-lbl::before{content:'🐾';font-size:12px}
.tx{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:12px;display:flex;align-items:center;gap:12px;margin-bottom:6px;box-shadow:var(--shadow);cursor:pointer;transition:border-color .15s}
.tx:active{border-color:var(--pink)}
.tx-ico{width:40px;height:40px;border-radius:11px;background:var(--pink-soft);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:19px}
.tx-body{flex:1;min-width:0}
.tx-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
.tx-meta{font-size:11px;color:var(--txt3);margin-top:1px;font-weight:600}
.tx-r{text-align:right;flex-shrink:0}
.tx-amt{font-family:var(--mono);font-size:14px;font-weight:500}
.tx-amt.a{color:var(--sky)}
.tx-amt.c{color:var(--lavender)}
.tx-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;display:inline-block;margin-top:3px}
.tx-badge.rec{background:var(--lav-soft);color:var(--lavender)}
.tx-badge.once{background:var(--pink-soft);color:var(--pink)}

/* ── Charts ── */
.chart-wrap{position:relative;height:220px}

/* ── Settings ── */
.srow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1.5px solid var(--border)}
.srow:last-child{border:none;padding-bottom:0}
.srow-lbl{font-size:13px;font-weight:700}
.srow-val{font-family:var(--mono);font-size:11px;color:var(--txt3)}

/* ── Setup ── */
.setup{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}
.setup-h{font-size:30px;font-weight:900;letter-spacing:-1px;margin-bottom:6px;color:var(--txt)}
.setup-h em{font-style:normal;color:var(--pink)}
.setup-s{font-size:13px;color:var(--txt2);margin-bottom:32px;line-height:1.7;text-align:center;font-weight:600}
.setup-form{width:100%;max-width:360px}

/* ── States ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;gap:12px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--pink);border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:12px;color:var(--txt3);font-weight:700}
.empty{text-align:center;padding:48px 20px;color:var(--txt3)}
.empty-ico{font-size:52px;margin-bottom:12px}
.empty-t{font-size:14px;color:var(--txt2);font-weight:700}
.empty-s{font-size:12px;margin-top:4px;font-weight:600}

/* ── Toast ── */
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--txt);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:700;opacity:0;transition:all .22s;z-index:500;white-space:nowrap;pointer-events:none;box-shadow:0 4px 24px rgba(74,48,72,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Receipt ── */
.receipt-btn{width:100%;padding:12px;border-radius:12px;background:var(--lav-soft);border:1.5px solid var(--lavender);color:var(--lavender);font-size:13px;font-weight:800;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:var(--shadow);transition:all .15s}
.receipt-btn:active{opacity:.8}
.receipt-btn:disabled{opacity:.6;cursor:not-allowed}
.receipt-spin{width:14px;height:14px;border:2px solid var(--lavender);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}

/* ── Custom recurring ── */
.fixed-item{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1.5px solid var(--border)}
.fixed-item:last-child{border:none}
.fixed-item-name{flex:1;font-size:13px;font-weight:700}
.fixed-item-amt{font-family:var(--mono);font-size:12px;color:var(--txt3);margin-right:4px}
.fixed-del{background:var(--rose-soft);border:1.5px solid #fecdd3;color:#be123c;border-radius:8px;padding:4px 8px;font-size:11px;font-weight:800;cursor:pointer;font-family:var(--font)}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const GROCERY_BUDGET = 600;
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const CATS = [
  'Groceries','Dining Out','Entertainment','Transportation',
  'Utilities','Health','Shopping','Personal/Misc',"Patches' Expenses"
];
const ICONS = {
  'Groceries':'🛒','Dining Out':'🍽️','Entertainment':'🎮','Transportation':'🚗',
  'Utilities':'💡','Health':'🏥','Shopping':'🛍️','Personal/Misc':'📦',"Patches' Expenses":'🐱',
  'Recurring':'🔄','Fixed':'🔄','Subscriptions':'📱','Donation':'❤️'
};
const COLORS = {
  'Groceries':'#93c5fd','Dining Out':'#fdba74','Entertainment':'#c4b5fd',
  'Transportation':'#6ee7b7','Utilities':'#fde68a','Health':'#fda4b8',
  'Shopping':'#f0abfc','Personal/Misc':'#f9a8d4',"Patches' Expenses":'#fbcfe8',
  'Recurring':'#d8b4fe','Fixed':'#d8b4fe','Subscriptions':'#e879f9','Donation':'#fda4b8'
};
const DEFAULT_BUDGETS = {
  'Groceries':600,'Dining Out':200,'Entertainment':150,'Transportation':100,
  'Utilities':150,'Health':100,'Shopping':150,'Personal/Misc':100,"Patches' Expenses":75
};

const today = () => new Date().toISOString().split('T')[0];

// ─── State ────────────────────────────────────────────────────────────────────
const S = {
  view:'home', month:new Date().getMonth()+1, year:new Date().getFullYear(),
  txns:[], goals:[], loading:false, seeded:false,
  modal:null,
  editTx:null,
  scanning:false,
  incomeOpen: true,
  budgetsOpen: JSON.parse(localStorage.getItem('pp_budgets_open')||'true'),
  url: localStorage.getItem('casalog_url') || 'https://script.google.com/macros/s/AKfycbz_CFPxy9ojt9hFvf6bQlzRJFj9lbMAwT8xo4WGZZbDyKIDxf6-jF-hBZ6a2I2brnm1yg/exec',
  form:{ desc:'', amount:'', cat:'Groceries', payer:'Ateeq', txType:'One-time', date:today(), notes:'', receiptUrl:'' },
  incomeForm:{ desc:'', amount:'', source:'Ateeq', date:today(), notes:'' },
  goalForm:{ name:'', target:'', date:'', notes:'' },
  editForm:{},
  income: []
};
let _charts = {};

// ─── API ──────────────────────────────────────────────────────────────────────
async function api(params) {
  if (!S.url) return null;
  try { const r = await fetch(S.url+'?'+new URLSearchParams(params)); return await r.json(); }
  catch { showToast('⚠️ Connection error'); return null; }
}

async function load() {
  S.loading=true; render();
  const [tx,gl,inc] = await Promise.all([
    api({action:'getTransactions',month:S.month,year:S.year}),
    api({action:'getGoals'}),
    api({action:'getIncome',month:S.month,year:S.year})
  ]);
  S.loading=false;
  if (tx?.transactions) {

  if (inc?.income) S.income=inc.income;
  render();
}

// ─── Receipt ──────────────────────────────────────────────────────────────────
function compressImage(file,maxW,q) {
  return new Promise(res=>{
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{
      const sc=Math.min(1,maxW/img.width);
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url); res(c.toDataURL('image/jpeg',q));
    };
    img.src=url;
  });
}

async function handleReceipt(input) {
  const file=input.files[0]; if(!file) return;
  const apiKey=localStorage.getItem('pp_api_key')||'';
  if (!apiKey) { showToast('⚠️ Add API key in Settings first'); return; }
  S.scanning=true; render();
  try {
    const dataUrl=await compressImage(file,1200,.75);
    const base64=dataUrl.split(',')[1], mediaType='image/jpeg';
    showToast('🔍 Reading receipt…');
    const cr=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',max_tokens:200,
        system:`Parse this receipt. Return ONLY raw JSON with keys: amount (number), description (merchant name, max 40 chars), category (pick one: Groceries, Dining Out, Entertainment, Transportation, Utilities, Health, Shopping, Personal/Misc, Patches' Expenses)`,
        messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mediaType,data:base64}},{type:'text',text:'Parse this receipt.'}]}]
      })
    });
    const cd=await cr.json();
    const parsed=JSON.parse((cd?.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim());
    if (parsed.amount) S.form.amount=String(parseFloat(parsed.amount).toFixed(2));
    if (parsed.description) S.form.desc=parsed.description;
    if (parsed.category&&CATS.includes(parsed.category)) S.form.cat=parsed.category;
    showToast('☁️ Saving to Drive…');
    let receiptUrl='';
    try {
      const ur=await fetch(S.url,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'saveReceipt',base64,filename:`receipt_${Date.now()}.jpg`,mediaType})});
      const ud=await ur.json(); receiptUrl=ud?.url||'';
    } catch(e){console.warn('Drive upload failed:',e);}
    S.form.receiptUrl=receiptUrl;
    showToast(receiptUrl?'✅ Receipt scanned & saved!':'✅ Receipt scanned!');
  } catch(e) { console.error(e); showToast('⚠️ Could not read receipt'); }
  S.scanning=false; render();
}

function catTotals() { return S.txns.reduce((m,t)=>{const a=parseFloat(t.Amount)||0;m[t.Category]=(m[t.Category]||0)+a;return m;},{}); }
function personTotals() {
  return S.txns.reduce((m,t)=>{
    const a=parseFloat(t.Amount)||0;
    if (t.PaidBy==='Both') { m.ateeq+=a/2; m.celeste+=a/2; }
    else if (t.PaidBy==='Ateeq') m.ateeq+=a;
    else m.celeste+=a;
    return m;
  },{ateeq:0,celeste:0});
}
function incomeTotals() {
  return S.income.reduce((m,i)=>{
    const a=parseFloat(i.Amount)||0;
    if (i.Source==='Ateeq') m.ateeq+=a;
    else m.celeste+=a;
    m.total+=a;
    return m;
  },{ateeq:0,celeste:0,total:0});
}
function totalExpenses() { return S.txns.reduce((s,t)=>s+(parseFloat(t.Amount)||0),0); }
function daysUntil(ds) { if(!ds)return null;const d=new Date(ds+'T12:00:00'),n=new Date();n.setHours(0,0,0,0);return Math.ceil((d-n)/86400000); }
function goalPct(g) { const t=parseFloat(g.Target)||0,s=parseFloat(g.Saved)||0;return t>0?Math.min((s/t)*100,100):0; }

function f$(n) { return `$${n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`; }
function f0(n) { return `$${Math.round(n).toLocaleString('en-US')}`; }

function fmtDate(s) {
  if (!s) return '';
  const clean = String(s).split('T')[0];
  const d=new Date(clean+'T12:00:00'), t=new Date(); t.setHours(0,0,0,0);
  const y=new Date(t); y.setDate(t.getDate()-1);
  if (d>=t) return 'Today'; if (d>=y) return 'Yesterday';
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}

  const catPills=CATS.map((c,i)=>`<div class="cpill ${f.cat===c?'on':''}" style="font-size:8px" onclick="ef('cat',CATS[${i}])"><span class="ci" style="font-size:16px">${ICONS[c]}</span>${c}</div>`).join('');
  return `<div class="modal-bg" onclick="if(event.target.classList.contains('modal-bg')){S.editTx=null;render()}">
    <div class="modal">
      <div class="modal-title">✏️ Edit Transaction</div>
      <div class="fgroup"><label class="flabel">Amount</label><input class="finput big" type="text" inputmode="decimal" placeholder="0.00" value="${f.amount||''}" oninput="efs('amount',this.value)"></div>
      <div class="fgroup"><label class="flabel">Description</label><input class="finput" type="text" value="${f.desc||''}" oninput="efs('desc',this.value)"></div>
      <div class="fgroup"><label class="flabel">Category</label><div class="cat-pick">${catPills}</div></div>
      <div class="fgroup"><label class="flabel">Paid By</label><div class="toggle-row"><div class="tpill ${f.paidBy==='Ateeq'?'on':''}" onclick="ef('paidBy','Ateeq')">🧑 Ateeq</div><div class="tpill ${f.paidBy==='Both'?'on g':''}" onclick="ef('paidBy','Both')">🤝 Both</div><div class="tpill ${f.paidBy==='Celeste'?'on v':''}" onclick="ef('paidBy','Celeste')">👩 Celeste</div></div></div>
      <div class="fgroup"><label class="flabel">Type</label><div class="toggle-row"><div class="tpill ${f.txType==='One-time'?'on':''}" onclick="ef('txType','One-time')">✨ One-time</div><div class="tpill ${f.txType==='Recurring'?'on y':''}" onclick="ef('txType','Recurring')">🔄 Recurring</div></div></div>
      <div class="fgroup"><label class="flabel">Date</label><input class="finput" type="date" value="${f.date||''}" oninput="efs('date',this.value)"></div>
      <div class="fgroup"><label class="flabel">Notes</label><input class="finput" type="text" value="${f.notes||''}" oninput="efs('notes',this.value)"></div>
      <div class="modal-row">
        <button class="modal-cancel" onclick="S.editTx=null;render()">Cancel</button>
        <button class="modal-confirm" onclick="saveEdit()">Save Changes</button>
      </div>
      <button class="modal-del" onclick="deleteTx()">🗑️ Delete Transaction</button>
    </div>
  </div>`;
}

function goalsHTML() {
  if (!S.goals.length) return `<div class="empty"><div class="empty-ico">✨</div><div class="empty-t">No savings goals yet!</div><div class="empty-s">What are you saving up for?</div></div><button class="sub-btn" style="margin-top:16px" onclick="go('goalForm')">+ New Goal ✨</button>`;
  return `
    <button class="sub-btn" style="margin-bottom:12px" onclick="go('goalForm')">+ New Goal ✨</button>
    ${S.goals.map(g=>{
      const pct=goalPct(g),saved=parseFloat(g.Saved)||0,target=parseFloat(g.Target)||0;
      const remaining=Math.max(target-saved,0),done=remaining<0.01,days=daysUntil(g.TargetDate);
      const trackCls=pct<50?'safe':pct<85?'warn':'danger';
      return`<div class="goal-card">
        <div class="goal-top"><div><div class="goal-name">${g.Name}</div>${g.TargetDate?`<div class="goal-date">${days===null?'':days>0?`${days} days left ⏰`:days===0?'Due today! 🎉':`${Math.abs(days)}d overdue`} · ${new Date(g.TargetDate+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>`:''}</div><div class="goal-pct">${Math.round(pct)}%</div></div>
        <div class="goal-nums"><span class="goal-saved">${f$(saved)} saved</span><span class="goal-target">of ${f$(target)}</span></div>
        <div class="track"><div class="track-fill ${trackCls}" style="width:${pct}%"></div></div>
        ${g.Notes?`<div class="goal-note">💭 ${g.Notes}</div>`:''}
        ${done?`<div class="goal-done"><span class="goal-done-badge">🎉 Goal reached!</span></div>`:`<div class="goal-actions"><button class="goal-btn add-prog" onclick="openProgressModal('${g.ID}','${g.Name.replace(/'/g,"\\'")}',${remaining})">💰 Add Progress</button><button class="goal-btn del-goal" onclick="deleteGoal('${g.ID}')">Remove</button></div>`}
      </div>`;}).join('')}
    ${S.modal?progressModalHTML():''}`;
}

function goalFormHTML() {
  const f=S.goalForm;
  return `
    <div class="fgroup"><label class="flabel">Goal Name</label><input class="finput" type="text" placeholder="e.g. Europe Trip, New Couch…" value="${f.name}" oninput="gfs('name',this.value)"></div>
    <div class="fgroup"><label class="flabel">Target Amount</label><input class="finput big" type="text" inputmode="decimal" placeholder="0.00" value="${f.target}" oninput="gfs('target',this.value)"></div>
    <div class="fgroup"><label class="flabel">Target Date (optional)</label><input class="finput" type="date" value="${f.date}" oninput="gfs('date',this.value)"></div>
    <div class="fgroup"><label class="flabel">Notes (optional)</label><input class="finput" type="text" placeholder="e.g. Summer 2026, split equally…" value="${f.notes}" oninput="gfs('notes',this.value)"></div>
    <button class="sub-btn" id="gsb" onclick="submitGoal()">✨ Save Goal</button>
    <button class="sub-btn" style="margin-top:8px;background:var(--bg2);color:var(--txt2);box-shadow:none;border:1.5px solid var(--border)" onclick="go('goals')">Cancel</button>`;
}

function progressModalHTML() {
  const m=S.modal;
  return `<div class="modal-bg" onclick="if(event.target.classList.contains('modal-bg'))S.modal=null,render()">
    <div class="modal">
      <div class="modal-title">💰 Add progress</div>
      <div style="font-size:12px;color:var(--txt3);margin-bottom:16px;font-weight:600">${m.goalName} · ${f$(m.remaining)} to go</div>
      <label class="flabel">Amount saved</label>
      <input class="finput big" type="text" inputmode="decimal" placeholder="0.00" id="progAmt" style="margin-bottom:4px">
      <div class="modal-row">
        <button class="modal-cancel" onclick="S.modal=null;render()">Cancel</button>
        <button class="modal-confirm" onclick="addProgress('${m.goalId}',document.getElementById('progAmt').value)">Save 🎉</button>
      </div>
    </div>
  </div>`;
}

function incomeHTML() {
  const f=S.incomeForm;
  const inc=incomeTotals();
  const rows=S.income.length
    ? [...S.income].sort((a,b)=>b.Date.localeCompare(a.Date)).map(i=>`
        <div class="tx">
          <div class="tx-ico">${i.Source==='Ateeq'?'🧑':'👩'}</div>
          <div class="tx-body">
            <div class="tx-name">${i.Description}</div>
            <div class="tx-meta">${i.Source} · ${fmtDate(i.Date)}${i.Notes?` · ${i.Notes}`:''}</div>
          </div>
          <div class="tx-r">
            <div class="tx-amt ${i.Source==='Ateeq'?'a':'c'}">${f$(parseFloat(i.Amount)||0)}</div>
            <button onclick="deleteIncome('${i.ID}')" style="font-size:10px;font-weight:800;color:var(--rose);background:var(--rose-soft);border:none;border-radius:6px;padding:2px 7px;margin-top:3px;cursor:pointer;font-family:var(--font)">✕</button>
          </div>
        </div>`).join('')
    : `<div class="empty" style="padding:24px 0"><div class="empty-ico" style="font-size:36px">💸</div><div class="empty-t">No income logged yet</div></div>`;

  return `
    <div class="stats-grid" style="margin-bottom:10px">
      <div class="stat"><div class="stat-lbl"><span class="pip" style="background:var(--sky)"></span>Ateeq</div><div class="stat-val pink">${f$(inc.ateeq)}</div></div>
      <div class="stat"><div class="stat-lbl"><span class="pip" style="background:var(--lavender)"></span>Celeste</div><div class="stat-val lav">${f$(inc.celeste)}</div></div>
    </div>
    <div class="card" style="background:linear-gradient(135deg,#d1fae5,#dbeafe);margin-bottom:10px">
      <div class="total-eyebrow">Total Income · ${MONTHS[S.month-1]}</div>
      <div style="font-family:var(--mono);font-size:32px;font-weight:500;letter-spacing:-1.5px;color:var(--txt)">${f$(inc.total)}</div>
    </div>
    <div class="card">
      <div class="card-title">+ Log Income</div>
      <div class="fgroup"><label class="flabel">Amount</label><input class="finput big" type="text" inputmode="decimal" placeholder="0.00" value="${f.amount}" oninput="ifs('amount',this.value)" style="font-size:28px;padding:12px"></div>
      <div class="fgroup"><label class="flabel">Description</label><input class="finput" type="text" placeholder="e.g. Commercial shoot, Nanny gig" value="${f.desc}" oninput="ifs('desc',this.value)"></div>
      <div class="fgroup"><label class="flabel">Source</label><div class="toggle-row"><div class="tpill ${f.source==='Ateeq'?'on':''}" onclick="iff('source','Ateeq')">🧑 Ateeq</div><div class="tpill ${f.source==='Celeste'?'on v':''}" onclick="iff('source','Celeste')">👩 Celeste</div></div></div>
      <div class="fgroup"><label class="flabel">Date</label><input class="finput" type="date" value="${f.date}" oninput="ifs('date',this.value)"></div>
      <div class="fgroup"><label class="flabel">Notes (optional)</label><input class="finput" type="text" placeholder="e.g. Nike commercial, Johnson family" value="${f.notes}" oninput="ifs('notes',this.value)"></div>
      <button class="sub-btn" id="isb" onclick="submitIncome()" style="background:linear-gradient(135deg,var(--mint),var(--sky));box-shadow:0 6px 24px rgba(52,211,153,0.25)">+ Add Income 💰</button>
    </div>
    <div class="card">
      <div class="card-title">Income Log</div>
      ${rows}
    </div>
  `;
}

function chartsHTML() {
  return `
    <div class="card"><div class="card-title">🌈 Spending by Category</div><div class="chart-wrap"><canvas id="cChart"></canvas></div></div>
    <div class="card"><div class="card-title">💸 Ateeq vs Celeste</div><div class="chart-wrap"><canvas id="pChart"></canvas></div></div>`;
}

function settingsHTML() {
  const custom=getCustomFixed();
  const budgets=getCatBudgets();
  const customRows=custom.length
    ?custom.map(x=>`<div class="fixed-item"><span class="fixed-item-name">${x.name}</span><span class="fixed-item-amt">$${x.amount} · ${x.paidBy}</span><button class="fixed-del" onclick="removeCustomFixed(${x.id})">✕</button></div>`).join('')
    :`<div style="font-size:12px;color:var(--txt3);font-weight:600;padding:8px 0">No custom recurring costs yet.</div>`;
  const budgetEditors=CATS.map((cat,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1.5px solid var(--border)">
      <span style="flex:1;font-size:13px;font-weight:700">${ICONS[cat]} ${cat}</span>
      <input type="text" inputmode="decimal" value="${budgets[cat]||0}" style="width:80px;background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-family:var(--mono);font-size:12px;color:var(--txt);font-weight:500;text-align:right;outline:none" oninput="saveCatBudgetByIndex(${i},this.value)">
    </div>`).join('');
  return `
    <div class="card">
      <div class="card-title">🔄 Built-in Recurring</div>
      <div class="srow"><span class="srow-lbl">Rent</span><span class="srow-val">$1,800 · 50/50</span></div>
      <div class="srow"><span class="srow-lbl">Internet</span><span class="srow-val">$95 · Ateeq</span></div>
      <div class="srow"><span class="srow-lbl">Spotify (×2)</span><span class="srow-val">$20 each</span></div>
      <div class="srow"><span class="srow-lbl">Planned Parenthood</span><span class="srow-val">$10 · Celeste</span></div>
      <div class="srow"><span class="srow-lbl">🐱 Patches' Expenses</span><span class="srow-val">Manual · Celeste</span></div>
    </div>
    <div class="card">
      <div class="card-title">➕ Custom Recurring</div>
      <div style="font-size:11px;color:var(--txt3);font-weight:600;margin-bottom:10px">Auto-seeded each month alongside built-in ones.</div>
      ${customRows}
      <div style="margin-top:12px;display:flex;flex-direction:column;gap:7px">
        <input class="finput" id="cfName" type="text" placeholder="Name (e.g. Gym membership)">
        <div style="display:flex;gap:8px">
          <input class="finput" id="cfAmt" type="text" inputmode="decimal" placeholder="Amount ($)" style="flex:1">
          <select class="finput" id="cfWho" style="flex:1"><option value="Ateeq">Ateeq</option><option value="Celeste">Celeste</option></select>
        </div>
        <button class="sub-btn" onclick="addCustomFixed()" style="padding:12px;font-size:13px">+ Add Recurring Cost</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📊 Monthly Budgets</div>
      <div style="font-size:11px;color:var(--txt3);font-weight:600;margin-bottom:10px">Set monthly spending targets per category.</div>
      ${budgetEditors}
    </div>
    <div class="card">
      <div class="card-title">🔗 Apps Script URL</div>
      <input class="finput" type="url" id="urlIn" placeholder="https://script.google.com/…" value="${S.url}" style="margin-bottom:10px" oninput="S.url=this.value;localStorage.setItem('casalog_url',this.value)">
      <button class="sub-btn" onclick="load()">Connect &amp; Refresh</button>
    </div>
    <div class="card">
      <div class="card-title">📷 Receipt Scanning</div>
      <p style="font-size:11px;color:var(--txt3);font-weight:600;margin-bottom:10px;line-height:1.6">Get a key at <strong style="color:var(--txt2)">console.anthropic.com</strong> → API Keys. Set a $5 spend limit to stay safe.</p>
      <input class="finput" type="password" id="apiKeyIn" placeholder="sk-ant-api03-…" value="${localStorage.getItem('pp_api_key')||''}" style="margin-bottom:10px" oninput="localStorage.setItem('pp_api_key',this.value)">
      <div style="font-size:11px;color:${localStorage.getItem('pp_api_key')?'var(--mint)':'var(--txt3)'};font-weight:700">
        ${localStorage.getItem('pp_api_key')?'✅ API key saved':'⚠️ No API key — receipt scanning disabled'}
      </div>
    </div>`;
}

function setupHTML() {
  return `<div class="setup">
    <div style="margin-bottom:16px">${catSVG(80)}</div>
    <div class="setup-h">Patchin<em>Pennies</em></div>
    <div class="setup-s">Finance tracker for Ateeq, Celeste &amp; Patches 🐾<br>Connect your Google Apps Script to get started.</div>
    <div class="setup-form">
      <div class="fgroup"><label class="flabel">Apps Script URL</label><input class="finput" type="url" id="su" placeholder="https://script.google.com/…" value="${S.url}"></div>
      <button class="sub-btn" onclick="connectSetup()">Connect 🐱</button>
    </div>
  </div>`;
}

// ─── Charts ───────────────────────────────────────────────────────────────────
function drawCharts() {
  if (S.view!=='charts') return;
  setTimeout(()=>{
    Object.values(_charts).forEach(c=>c.destroy()); _charts={};
    const cats=catTotals(), valid=Object.entries(cats), {ateeq,celeste}=personTotals();
    Chart.defaults.color='#b89aad'; Chart.defaults.font.family="'Nunito',sans-serif"; Chart.defaults.font.weight='700';
    const cEl=document.getElementById('cChart');
    if (cEl&&valid.length) _charts.c=new Chart(cEl,{type:'doughnut',data:{labels:valid.map(([k])=>k),datasets:[{data:valid.map(([,v])=>v),backgroundColor:valid.map(([k])=>COLORS[k]||'#f9a8d4'),borderWidth:3,borderColor:'#fdf6f9',hoverOffset:10}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{position:'bottom',labels:{padding:12,font:{size:9,weight:'700'}}},tooltip:{callbacks:{label:ctx=>` $${ctx.parsed.toFixed(2)}`}}}}});
    const pEl=document.getElementById('pChart');
    if (pEl) _charts.p=new Chart(pEl,{type:'bar',data:{labels:['Ateeq','Celeste'],datasets:[{data:[ateeq,celeste],backgroundColor:['#93c5fd','#c4b5fd'],borderRadius:10,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#f0d6e8'},ticks:{font:{size:11,weight:'700'}}},y:{grid:{color:'#f0d6e8'},ticks:{font:{size:11,weight:'700'},callback:v=>'$'+v}}}}});
  },60);
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function go(view) { S.view=view; render(); if(view==='charts') drawCharts(); window.scrollTo(0,0); }
function ff(k,v)  { S.form[k]=v; render(); }
function ffs(k,v) { S.form[k]=v; }
function gf(k,v)  { S.goalForm[k]=v; render(); }
function gfs(k,v) { S.goalForm[k]=v; }
function ef(k,v)  { S.editForm[k]=v; render(); }
function efs(k,v) { S.editForm[k]=v; }
function setCat(i){ S.form.cat=CATS[i]; render(); }
function openProgressModal(goalId,goalName,remaining){ S.modal={goalId,goalName,remaining}; render(); }
function prevMo(){ S.month===1?(S.month=12,S.year--):S.month--; load(); }
function nextMo(){ S.month===12?(S.month=1,S.year++):S.month++; load(); }
function iff(k,v) { S.incomeForm[k]=v; render(); }
function ifs(k,v) { S.incomeForm[k]=v; }
function toggleBudgets(){ S.budgetsOpen=!S.budgetsOpen; localStorage.setItem('pp_budgets_open',S.budgetsOpen); render(); }
function triggerReceipt(){ document.getElementById('receiptInput')?.click(); }
function connectSetup(){ const url=(document.getElementById('su')?.value||'').trim(); if(!url){showToast('⚠️ Enter URL');return;} S.url=url; localStorage.setItem('casalog_url',url); load(); }
function showToast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2600); }

// Transaction lookup map — populated on load, used by openEdit
let _txMap = {};

function openEdit(id) {
  const t = _txMap[id];
  if (!t) { showToast('⚠️ Transaction not found'); return; }
  S.editTx = t;
  S.editForm = {
    id:     t.ID,
    date:   String(t.Date||'').split('T')[0],
    desc:   t.Description,
    cat:    t.Category,
    paidBy: t.PaidBy,
    amount: String(t.Amount||''),
    txType: t.TxType||'One-time',
    notes:  t.Notes||''
  };
  render();
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const noUrl=!S.url, mo=MONTHS[S.month-1]+' '+S.year;
  const showMoNav=!noUrl&&!['add','settings','goalForm','income'].includes(S.view);
  const navDef=[
    {id:'home',  icon:'🏠', label:'Home'},
    {id:'add',   icon:'+',  label:'Add', add:true},
    {id:'log',   icon:'📋', label:'Log'},
    {id:'income',icon:'💰', label:'Income'},
    {id:'goals', icon:'✨', label:'Goals'},
    {id:'charts',icon:'📊', label:'Charts'},
    {id:'settings',icon:'⚙️',label:'Settings'},
  ];
  let body='';
  if (noUrl) body=setupHTML();
  else {switch(S.view){
    case'home':    body=homeHTML();    break;
    case'add':     body=addHTML();     break;
    case'log':     body=logHTML();     break;
    case'income':  body=incomeHTML();  break;
    case'goals':   body=goalsHTML();   break;
    case'goalForm':body=goalFormHTML();break;
    case'charts':  body=chartsHTML();  break;
    case'settings':body=settingsHTML();break;
  }}

  document.getElementById('app').innerHTML=`
    ${!noUrl?`<header class="hdr">
      <div class="hdr-top">
        <div class="wordmark">${catSVG(30)}Patchin<em>Pennies</em></div>
        ${S.loading?`<div class="mini-spinner"></div>`:`<div class="hdr-chip"><span class="dot"></span>Chicago, IL</div>`}
      </div>
      ${showMoNav?`<div class="month-row"><button class="month-btn" onclick="prevMo()">‹</button><div class="month-lbl">${mo}</div><button class="month-btn" onclick="nextMo()">›</button></div>`:''}
    </header>`:''}
    <div class="view on ${['add','goalForm'].includes(S.view)?'add-view':''}">${body}</div>
    ${!noUrl?`<nav class="nav">${navDef.map(n=>{const isOn=S.view===n.id;return`<button class="nav-btn ${n.add?'add-btn':''} ${isOn&&!n.add?'on':''} ${isOn&&S.view==='goals'?'amber':''}" onclick="go('${n.id}')"><span class="nav-icon">${n.icon}</span><span>${n.label}</span></button>`;}).join('')}</nav>`:''}
  `;
}

render();
if (S.url) load();
</script>
</body>
</html>
